services:
  zenoh:
    image: eclipse/zenoh
    hostname: zenoh
    ports:
      - "7447:7447"
      - "8000:8000"
    environment:
      - RUST_LOG=info

  orchestrator:
    build:
      context: ./../../../../..
      dockerfile: docker/Dockerfile.python-app
    container_name: orchestrator
    depends_on:
      - zenoh
    command: ["python", "-u", "-m", "bw.services.orchestrator.main"]
    volumes:
      - ./../../../../../out/python:/app/out
    env_file:
     - ./../../../../../.env
    environment:
      - ZENOH_ENDPOINT=tcp/zenoh:7447

  producer:
    build:
      context: ./../../../../..
      dockerfile: docker/Dockerfile.python-app
    container_name: producer
    depends_on:
      - zenoh
    command: ["python", "-u", "-m", "bw.services.producer.main"]
    volumes:
      - ./../../../../../out/python:/app/out
    env_file:
     - ./../../../../../.env
    environment:
      - ZENOH_ENDPOINT=tcp/zenoh:7447

  consumer:
    build:
      context: ./../../../../..
      dockerfile: docker/Dockerfile.python-app
    container_name: consumer
    depends_on:
      - zenoh
    command: ["python", "-u", "-m", "bw.services.consumer.main"]
    volumes:
      - ./../../../../../out/python:/app/out
    env_file:
     - ./../../../../../.env
    environment:
      - ZENOH_ENDPOINT=tcp/zenoh:7447