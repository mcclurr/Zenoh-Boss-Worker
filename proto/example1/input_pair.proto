syntax = "proto3";

package demo.example1;

import "common/common.proto";

message TopicAMessage {
  string cycle_id = 1;
  string text = 2;
  demo.common.RequestContext context = 3;
}

message TopicBMessage {
  string cycle_id = 1;
  int64 value = 2;
  demo.common.RequestContext context = 3;
}

message CombinedInput {
  string combined_id = 1;
  TopicAMessage topic_a = 2;
  TopicBMessage topic_b = 3;
  demo.common.RequestContext context = 4;
}